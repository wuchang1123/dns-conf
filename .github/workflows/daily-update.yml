name: Daily refresh out/

on:
  schedule:
    # 每天 00:00（中国时区 Asia/Shanghai，无夏令时）
    - cron: "0 0 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update-out
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # v5+ 使用 Node.js 24 运行时，避免 Node 20 弃用告警
      - uses: actions/checkout@v5

      - name: Regenerate out/
        run: |
          chmod +x convert-dnsmasq-china.sh
          ./convert-dnsmasq-china.sh

      - name: Commit and push if out/ changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out/
          if git diff --staged --quiet; then
            echo "No changes in out/"
            exit 0
          fi
          git commit -m "chore(out): refresh from dnsmasq-china-list ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
